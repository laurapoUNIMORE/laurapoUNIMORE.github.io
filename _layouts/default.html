<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

<body>

<header class="page-header">
  <h1 class="project-name">{{ site.title }}</h1>
  <h2 class="project-tagline">{{ site.description }}</h2>

<nav class="site-nav">

<a href="{{ '/' | relative_url }}"
   class="{% if page.url == '/' %}active{% endif %}">Home</a>

<a href="{{ '/research' | relative_url }}"
   class="{% if page.url contains 'research' %}active{% endif %}">Research</a>

<a href="{{ '/teaching' | relative_url }}"
   class="{% if page.url contains 'teaching' %}active{% endif %}">Teaching</a>

<a href="{{ '/projects' | relative_url }}"
   class="{% if page.url contains 'projects' %}active{% endif %}">Projects</a>

<a href="{{ '/CV' | relative_url }}"
   class="{% if page.url contains 'CV' %}active{% endif %}">CV</a>

<a href="{{ '/erasmus' | relative_url }}"
   class="{% if page.url contains 'erasmus' %}active{% endif %}">Erasmus</a>

</nav>
</header>

<main class="main-content">
  {{ content }}
</main>

</body>
</html>
